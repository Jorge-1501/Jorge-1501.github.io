<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/assets/img/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Jorge Toral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        // Lógica de detección de preferencia de color
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }
    </script>

    <style>
        :root {
            /* Paleta Otoño Profundo - Modo Claro */
            --bg-color: #FFF9F2; /* Hueso/Crema */
            --sidebar-bg: #2C362E; /* Verde Bosque Profundo */
            --sidebar-text: #E0D8C3; 
            --text-main: #3E2723; /* Café Espresso */
            --text-muted: #795548;
            --accent: #A04523; /* Terracota */
            --header-bg: rgba(255, 249, 242, 0.8);
            --border: rgba(62, 39, 35, 0.1);
        }

        .dark {
            /* Paleta Otoño Profundo - Modo Oscuro */
            --bg-color: #1a1c1a; /* Negro pizarra verdoso */
            --sidebar-bg: #0d110e;
            --sidebar-text: #a4b3a7;
            --text-main: #e0d8c3; /* Crema suave */
            --text-muted: #a49d8c;
            --accent: #d87d52; /* Óxido claro */
            --header-bg: rgba(26, 28, 26, 0.8);
            --border: rgba(224, 216, 195, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .prose-container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* Utilidades personalizadas para las variables */
        .sidebar-theme { background-color: var(--sidebar-bg); color: var(--sidebar-text); }
        .border-theme { border-color: var(--border); }
        .accent-text { color: var(--accent); }
    </style>
</head>
<body class="flex min-h-screen">

    {%include sidebar.html %}

    <main class="flex-1 transition-all duration-500">

        <script>
            function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                // ABRIR
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                // CERRAR
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 500);
            }
            }
        </script>

        {{ content }}
    </main>

</body>
</html>

{% include scripts.html %}
